name: Release

# Builds installers for Windows, macOS and Linux. Pushing a version tag
# (e.g. `git tag v0.1.0`) attaches them to a GitHub release; a manual run
# (workflow_dispatch) only uploads them as workflow artifacts.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifacts: dist/*.exe
          - os: macos-latest
            artifacts: dist/*.dmg
          - os: ubuntu-latest
            artifacts: dist/*.AppImage
    runs-on: ${{ matrix.os }}
    env:
      # No code-signing certificates in CI - produce unsigned builds.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # Registry hiccups (ECONNRESET) show up on hosted runners now and
        # then - retry twice with a pause before giving up.
        run: npm ci || (sleep 20 && npm ci) || (sleep 60 && npm ci)
        shell: bash

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Package
        run: npx electron-builder --publish never

      - name: Upload build artifacts (manual run)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-build
          path: ${{ matrix.artifacts }}

      - name: Attach to release (tag run)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifacts }}
          generate_release_notes: true
